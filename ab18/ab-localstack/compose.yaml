services:
  arcane:
    image: ghcr.io/getarcaneapp/arcane:latest
    container_name: arcane
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/dietpi/localstack/data/arcane_data:/app/data
      - /home/dietpi/localstack/stacks:/app/data/projects
    environment:
      - APP_URL=https://dock.ab18.in
      - PUID=1000
      - PGID=1000
    env_file: .env
    restart: always
    networks:
      - network-layer
    dns:
      - 10.10.10.10
    labels:
      - traefik.enable=true
      - traefik.http.routers.arcane.rule=Host(`dock.ab18.in`)
      - traefik.http.services.arcane.loadbalancer.server.port=3552
      - traefik.http.routers.arcane.middlewares=auth
  watchtower:
    image: nickfedor/watchtower
    container_name: watchtower
    restart: always
    environment:
      - WATCHTOWER_UPDATE_ON_START=true
      - WATCHTOWER_POLL_INTERVAL=300
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
  otel:
    image: grafana/otel-lgtm:latest
    container_name: otel
    volumes:
      - /home/dietpi/localstack/data/otel_data:/data
    restart: always
    networks:
      - network-layer
    labels:
      - traefik.enable=true
      - traefik.http.routers.otel.rule=Host(`otel.ab18.in`)
      - traefik.http.services.otel.loadbalancer.server.port=3000
networks:
  network-layer:
    name: tailscale_bridge
    external: true
