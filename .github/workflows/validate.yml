name: Validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  compose:
    name: Validate Compose files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for git diff against base

      - name: Find changed compose files
        id: changed
        run: |
          BASE=${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || 'HEAD~1' }}
          # --diff-filter=d excludes deleted files — runner can't validate what no longer exists
          FILES=$(git diff --name-only --diff-filter=d "$BASE" HEAD -- '**/compose.yaml' | tr '\n' ' ')
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
          echo "any=$([[ -n "$FILES" ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Stub missing env files
        if: steps.changed.outputs.any == 'true'
        run: |
          sudo pip install pyyaml -q
          sudo python3 scripts/stub_envfiles.py ${{ steps.changed.outputs.files }}

      - name: Validate changed compose files
        if: steps.changed.outputs.any == 'true'
        run: |
          EXIT=0
          for file in ${{ steps.changed.outputs.files }}; do
            echo "── Validating $file"
            docker compose -f "$file" config --quiet 2>&1 || {
              echo "FAIL: $file"
              EXIT=1
            }
          done
          exit $EXIT

      - name: No compose changes
        if: steps.changed.outputs.any == 'false'
        run: echo "No compose.yaml files changed, nothing to validate."

  scripts:
    name: Lint shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint scripts/
        run: shellcheck scripts/*.sh
