services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: always
    volumes:
      - /home/dietpi/localstack/data/vaultwarden_data:/data
    networks:
      - network-layer
    env_file: /home/dietpi/localstack/secrets/ab-vaultwarden.env
    extra_hosts:
      - pg.ab18.in=10.10.10.11
    labels:
      - traefik.enable=true
      - traefik.http.routers.vault.rule=Host(`vault.ab18.in`)
      - traefik.http.routers.vault.middlewares=vault-headers
      - traefik.http.middlewares.vault-headers.headers.customrequestheaders.X-Forwarded-Proto=https
      - homepage.group=Utilities
      - homepage.name=VaultWarden
      - homepage.icon=https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/bitwarden.png
      - homepage.href=https://vault.ab18.in
      - homepage.description=Store your secrets securely
      #- traefik.http.routers.vault.middlewares=auth
networks:
  network-layer:
    name: tailscale_bridge
    external: true
