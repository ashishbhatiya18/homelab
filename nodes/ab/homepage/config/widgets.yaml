---
# For configuration options and examples, please see:
# https://gethomepage.dev/configs/info-widgets/

- resources:
    cpu: true
    memory: true
    disk: /
    cputemp: true
    uptime: true


- stocks:
    provider: finnhub
    color: true # optional, defaults to true
    cache: 60 # optional, default caches results for 1 minute
    watchlist:
      - PYPL
      - AMZN
      

- search:
    provider: google
    target: _blank
    focus: true
    showSearchSuggestions: true