---
# For configuration options and examples, please see:
# https://gethomepage.dev/configs/services/

- Local Networks:
    - PiHole:
        icon: https://upload.wikimedia.org/wikipedia/commons/0/00/Pi-hole_Logo.png
        href: http://10.10.10.10/admin
        description: DNS Management
        server: cd-docker
        container: pihole
        widget:
          type: pihole
          url: http://10.10.10.10
          version: 6 # required if running v6 or higher, defaults to 5
          key: azsxdc18 # optional, in v6 can be your password or app password
    - Traefik:
        icon: traefik.png
        href: https://proxy.ab18.in
        description: Traefik Reverse Proxy
        server: my-docker
        container: traefik
        widget:
          type: traefik
          url: https://proxy.ab18.in
    - Cloudflare Tunnels(ab18.in):
        server: my-docker
        container: cloudflared
        icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/cloudflare-zero-trust.png
        widget:
          type: cloudflared
          accountid: 8a420fa9dc8c2fc86b4caa6c8673ea94 # from zero trust dashboard url e.g. https://one.dash.cloudflare.com/<accountid>/home/quick-start
          tunnelid: 0a2e8420-e3cb-4cb0-99c7-d36181d4e01b # found in tunnels dashboard under the tunnel name
          key: H_Jw1dn0E2XiguBtOccOSnVVuTzN5rmH_FeQeo31 # api token with `Account.Cloudflare Tunnel:Read` https://dash.cloudflare.com/profile/api-tokens
    - TailScale:
        server: my-docker
        container: tailscale
        icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/tailscale-light.png
        widget:
          type: tailscale
          deviceid: ng2jz73UTJ11CNTRL
          key: tskey-api-kW2KEaMXrs11CNTRL-rmTez57ewgZpUeoudafidZvKvy7kTcHmF
- CD Essentials:
    - Cloudflare Tunnels(citrusdental.in):
        server: cd-docker
        container: cloudflare
        widget:
          type: cloudflared
          accountid: 8a420fa9dc8c2fc86b4caa6c8673ea94 # from zero trust dashboard url e.g. https://one.dash.cloudflare.com/<accountid>/home/quick-start
          tunnelid: 328126d9-3836-45e3-8a75-ee9f5085aaa0 # found in tunnels dashboard under the tunnel name
          key: H_Jw1dn0E2XiguBtOccOSnVVuTzN5rmH_FeQeo31 # api token with `Account.Cloudflare Tunnel:Read` https://dash.cloudflare.com/profile/api-tokens
    - TailScale:
        server: cd-docker
        container: tailscale
        widget:
          type: tailscale
          deviceid: nAGYbthBPW11CNTRL
