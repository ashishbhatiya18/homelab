services:
  postgresql:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    container_name: postgres
    hostname: postgres
    restart: always
    volumes:
      - /home/dietpi/localstack/data/pg_data:/var/lib/postgresql/data
    env_file: /home/dietpi/localstack/secrets/ab-data.env
    networks:
      - data-layer
      - network-layer
    labels:
      - traefik.enable=true
      - traefik.tcp.routers.pg.rule=HostSNI(`pg.ab18.in`)
      - traefik.tcp.routers.pg.tls.options=db@file
      - traefik.tcp.routers.pg.entrypoints=websecure
      - traefik.tcp.routers.pg.tls=true
      - traefik.tcp.routers.pg.tls.certresolver=myresolver
    shm_size: 128mb
  redis:
    image: redis:alpine
    container_name: redis
    restart: always
    networks:
      - data-layer
      - network-layer
    volumes:
      - /home/dietpi/localstack/data/redis_data:/data
    labels:
      - traefik.enable=true
      - traefik.tcp.routers.redis.rule=HostSNI(`redis.ab18.in`)
      - traefik.tcp.routers.redis.entrypoints=websecure
      - traefik.tcp.routers.redis.tls=true
networks:
  data-layer:
    external: true
  network-layer:
    name: tailscale_bridge
    external: true
