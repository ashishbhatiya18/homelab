services:
  traefik:
    image: traefik:latest
    container_name: traefik
    restart: always
    networks:
      - network-layer
    ports:
      - 80:80
      - 443:443
      - 443:443/udp
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config/traefik/traefik.yml:/etc/traefik/traefik.yml
      - ./config/traefik/traefik_dynamic.yml:/etc/traefik/traefik_dynamic.yaml
      - ./config/traefik/acme.json:/etc/acme/acme.json
    environment:
      - CF_DNS_API_TOKEN_FILE=/run/secrets/cf_dns_api_token
    labels:
      - traefik.enable=true
      - traefik.http.routers.proxy.rule=Host(`proxy.ab18.in`)
      - traefik.http.routers.proxy.service=api@internal
      - com.centurylinklabs.watchtower.enable=false
    secrets:
      - cf_dns_api_token
  whoami:
    image: traefik/whoami
    container_name: whoami
    restart: always
    networks:
      - network-layer
    labels:
      - traefik.enable=true
      - traefik.http.routers.whoami.rule=Host(`whoami.ab18.in`)
      - traefik.http.routers.whoami.middlewares=auth
    depends_on:
      - traefik
  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale
    hostname: ab-node
    restart: always
    network_mode: host
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    volumes:
      - tailscale_state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    entrypoint: ["/bin/sh", "-c", "export TS_AUTHKEY=$(cat /run/secrets/ts_auth_key) && exec /usr/local/bin/containerboot"]
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_ACCEPT_DNS=false
      - TS_AUTH_ONCE=true
    secrets:
      - ts_auth_key
    labels:
      - com.centurylinklabs.watchtower.enable=false

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: always
    command: tunnel --no-autoupdate run
    env_file: /home/dietpi/localstack/secrets/ab-cloudflared.env
    networks:
      - network-layer
    labels:
      - com.centurylinklabs.watchtower.enable=false
  oauth2-proxy:
    image: bitnami/oauth2-proxy:latest
    container_name: oauth2-proxy
    restart: always
    networks:
      - network-layer
    volumes:
      - ./config/oauth2-proxy/config.toml:/etc/oauth2-proxy.cfg:ro
      - ./config/oauth2-proxy/emails.txt:/etc/emails.txt:ro
    command:
      - --config=/etc/oauth2-proxy.cfg
      - --authenticated-emails-file=/etc/emails.txt
      - --set-xauthrequest=true
    dns:
      - 1.1.1.1
    labels:
      - traefik.enable=true
      - traefik.http.routers.auth.rule=(Host(`auth.ab18.in`) || PathPrefix(`/oauth2`))
      - traefik.http.routers.auth.middlewares=auth-headers
      - traefik.http.middlewares.auth-headers.headers.stsSeconds=315360000
      - traefik.http.middlewares.auth-headers.headers.browserXssFilter=true
      - traefik.http.middlewares.auth-headers.headers.contentTypeNosniff=true
      - traefik.http.middlewares.auth-headers.headers.forceSTSHeader=true
      - traefik.http.middlewares.auth-headers.headers.stsIncludeSubdomains=true
      - traefik.http.middlewares.auth-headers.headers.stsPreload=true
      - traefik.http.middlewares.auth-headers.headers.frameDeny=true
      - traefik.http.middlewares.auth.forwardauth.address=http://oauth2-proxy:4180
      - traefik.http.middlewares.auth.forwardAuth.authResponseHeaders=X-Auth-Request-User,X-Auth-Request-Access-Token,Authorization
      - traefik.http.middlewares.auth.forwardAuth.maxResponseBodySize=10485760
      - homepage.group=Utilities
      - homepage.name=OAuth2-Proxy
      - homepage.icon=https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/oauth2-proxy.png
      - homepage.href=https://auth.ab18.in
      - homepage.description=Guardian of services
volumes:
  tailscale_state:

networks:
  network-layer:
    name: internal_bridge
    external: true

secrets:
  cf_dns_api_token:
    file: /home/dietpi/localstack/secrets/cf_dns_api_token
  ts_auth_key:
    file: /home/dietpi/localstack/secrets/ts_auth_key
