experimental:
  otlpLogs: true

entryPoints:
  websecure:
    address: :443
    forwardedHeaders:
      trustedIPs:
        - 173.245.48.0/20
        - 103.21.244.0/22
        - 103.22.200.0/22
        - 103.31.4.0/22
        - 141.101.64.0/18
        - 108.162.192.0/18
        - 190.93.240.0/20
        - 188.114.96.0/20
        - 197.234.240.0/22
        - 198.41.128.0/17
        - 162.158.0.0/15
        - 104.16.0.0/13
        - 104.24.0.0/14
        - 172.64.0.0/13
        - 131.0.72.0/22
    http3:
      advertisedPort: 443
    asDefault: true
    http:
      tls:
        certResolver: myresolver
  web:
    address: :80
    forwardedHeaders:
      trustedIPs:
        - 173.245.48.0/20
        - 103.21.244.0/22
        - 103.22.200.0/22
        - 103.31.4.0/22
        - 141.101.64.0/18
        - 108.162.192.0/18
        - 190.93.240.0/20
        - 188.114.96.0/20
        - 197.234.240.0/22
        - 198.41.128.0/17
        - 162.158.0.0/15
        - 104.16.0.0/13
        - 104.24.0.0/14
        - 172.64.0.0/13
        - 131.0.72.0/22
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
#  mysql:
#    address: :3306
#  pg:
#    address: :5432
#  redis:
#    address: :6379
providers:
  docker:
    exposedByDefault: false
    network: tailscale_bridge
  file:
    filename: /etc/traefik/traefik_dynamic.yaml
api:
  dashboard: true
log:
  level: INFO
#accessLog:
#  otlp:
#    grpc:
#      endpoint: otel:4317
#      insecure: true
accesslog: {}
metrics:
  otlp:
    grpc:
      endpoint: otel:4317
      insecure: true
ping:
  manualRouting: true
tracing:
  otlp:
    grpc:
      endpoint: otel:4317
      insecure: true

certificatesResolvers:
  myresolver:
    acme:
      storage: "/etc/acme/acme.json"
      certificatesDuration: 720
      dnsChallenge:
        provider: cloudflare
        resolvers:
          - "1.1.1.1:53"
          - "8.8.8.8:53"
