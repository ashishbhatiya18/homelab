services:
  traefik:
    image: traefik:latest
    container_name: traefik
    restart: always
    networks:
      - internal_bridge
    ports:
      - 80:80
      - 443:443
      - "443:443/udp"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config/traefik/traefik.yml:/etc/traefik/traefik.yml
      - ./config/traefik/acme.json:/etc/acme/acme.json
    environment:
      - CF_DNS_API_TOKEN_FILE=/run/secrets/cf_dns_api_token
    labels:
      - traefik.enable=true
      - traefik.http.routers.proxy.rule=Host(`proxy.citrusdental.in`)
      - com.centurylinklabs.watchtower.enable=false
      - traefik.http.routers.proxy.service=api@internal
      - homepage.group=CD Utilities
      - homepage.name=Traefik
      - homepage.icon=https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/traefik-proxy.png
      - homepage.href=https://proxy.citrusdental.in
      - homepage.description=Traefik Reverse Proxy
      - homepage.widget.type=traefik
      - homepage.widget.url=https://proxy.citrusdental.in
    secrets:
      - cf_dns_api_token

  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale
    hostname: cd-node
    restart: always
    network_mode: host
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    volumes:
      - tailscale_state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    entrypoint: ["/bin/sh", "-c", "export TS_AUTHKEY=$(cat /run/secrets/ts_auth_key) && exec /usr/local/bin/containerboot"]
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_ACCEPT_DNS=false
      - TS_AUTH_ONCE=true
    secrets:
      - ts_auth_key
    labels:
      - com.centurylinklabs.watchtower.enable=false

  dnsdist:
    image: powerdns/dnsdist-19
    container_name: dnsdist
    restart: always
    network_mode: host
    user: root
    cap_add:
      - NET_BIND_SERVICE
    labels:
      - com.centurylinklabs.watchtower.enable=false
    volumes:
      - ./config/dnsdist/dnsdist.conf:/etc/dnsdist/dnsdist.conf:ro
    depends_on:
      pihole:
        condition: service_healthy
  pihole:
    image: pihole/pihole
    container_name: pihole
    hostname: pihole
    restart: always
    healthcheck:
      test: ["CMD", "dig", "+noall", "+answer", "@127.0.0.1", "-p", "53", "pi.hole"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      - com.centurylinklabs.watchtower.enable=false
      - traefik.enable=true
      - traefik.http.routers.pihole.rule=Host(`pihole.citrusdental.in`)
      - traefik.http.routers.pihole.entrypoints=websecure
      - traefik.http.services.pihole.loadbalancer.server.port=80
      - homepage.group=CD Utilities
      - homepage.name=Pi-hole
      - homepage.icon=https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/pi-hole.png
      - homepage.href=https://pihole.citrusdental.in/admin
      - homepage.description=DNS Ad Blocker
    networks:
      - internal_bridge
    ports:
      - "127.0.0.1:5353:53/udp"
      - "127.0.0.1:5353:53/tcp"
    environment:
      - TZ=Asia/Kolkata
      - FTLCONF_DNS_REVSERVERS=true,10.10.0.0/24,10.10.10.1,lan
      - FTLCONF_DNS_DOMAINNEEDED=true
      - FTLCONF_DNS_BLOCKESNI=false
      - FTLCONF_DNS_EXPANDHOSTS=true
      - FTLCONF_DNS_DNSSEC=true
      - FTLCONF_DNS_SHOWDNSSEC=false
      - FTLCONF_DNS_UPSTREAMS=1.1.1.1
      - WEBPASSWORD_FILE=/run/secrets/pihole_web_password
      - FTLCONF_DATABASE_MAXDBDAYS=3
      - PIHOLE_UID=1000
      - PIHOLE_GID=1000
      - FTLCONF_WEBSERVER_PORT=80
      - DNSMASQ_LISTENING=all
    cap_add:
      - CAP_SYS_NICE
      - CAP_SYS_TIME
      - NET_ADMIN
    volumes:
      - ./config/pihole:/etc/pihole
      - ./config/pihole/dnsmasq.d:/etc/dnsmasq.d
    secrets:
      - pihole_web_password
volumes:
  tailscale_state:

networks:
  internal_bridge:
    name: internal_bridge
    external: true
secrets:
  cf_dns_api_token:
    file: /home/dietpi/localstack/secrets/cf_dns_api_token
  pihole_web_password:
    file: /home/dietpi/localstack/secrets/pihole_web_password
  ts_auth_key:
    file: /home/dietpi/localstack/secrets/ts_auth_key
