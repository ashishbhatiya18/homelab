-- Listen on all interfaces (UDP + TCP) — binds to LAN, Tailscale, and loopback
setLocal("0.0.0.0:53")

-- Pi-hole on localhost port 5353 (default pool)
newServer({address="127.0.0.1:5353", name="pihole"})

-- External resolver — used for apex domains from Tailscale clients
-- bypasses Pi-hole's dnsmasq wildcard entries (address=/ab18.in/... etc.)
newServer({address="1.1.1.1:53", name="external", pool="external"})

-- Tailscale source range
local ts_nets = newNMG()
ts_nets:addMask("100.64.0.0/10")

-- Apex domains → 1.1.1.1 directly for all clients
-- avoids Pi-hole dnsmasq wildcard (address=/ab18.in/10.10.10.11) returning LAN IP
addAction(QNameRule("ab18.in."), PoolAction("external"))
addAction(QNameRule("citrusdental.in."), PoolAction("external"))

-- Subdomains from Tailscale → spoof to node Tailscale IP
local smn_ab18 = newSuffixMatchNode()
smn_ab18:add("ab18.in.")
addAction(
  AndRule({NetmaskGroupRule(ts_nets), SuffixMatchNodeRule(smn_ab18)}),
  SpoofAction("100.108.211.112")
)

local smn_cd = newSuffixMatchNode()
smn_cd:add("citrusdental.in.")
addAction(
  AndRule({NetmaskGroupRule(ts_nets), SuffixMatchNodeRule(smn_cd)}),
  SpoofAction("100.116.167.96")
)

-- Everything else → Pi-hole
addAction(AllRule(), PoolAction(""))
