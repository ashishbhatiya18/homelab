-- Resolve a container hostname via Docker's embedded DNS at startup
local function resolve(hostname)
  local handle = io.popen("getent hosts " .. hostname .. " | awk '{print $1}'")
  local ip = handle:read("*a"):gsub("%s+", "")
  handle:close()
  return ip
end

-- Listen on all interfaces (UDP + TCP)
setLocal("0.0.0.0:53")

-- Single Pi-hole backend
newServer({address=resolve("pihole") .. ":53", name="pihole"})

-- Tailscale source range
local ts_nets = newNMG()
ts_nets:addMask("100.64.0.0/10")

-- ab18.in: Tailscale clients get the Tailscale IP inline, Pi-hole never sees it
local smn_ab18 = newSuffixMatchNode()
smn_ab18:add("ab18.in.")
addAction(
  AndRule({NetmaskGroupRule(ts_nets), SuffixMatchNodeRule(smn_ab18)}),
  SpoofAction("100.96.181.91")
)

-- citrusdental.in: same pattern
local smn_cd = newSuffixMatchNode()
smn_cd:add("citrusdental.in.")
addAction(
  AndRule({NetmaskGroupRule(ts_nets), SuffixMatchNodeRule(smn_cd)}),
  SpoofAction("100.66.183.5")
)

-- Everything else → Pi-hole
addAction(AllRule(), PoolAction(""))
