# Cloudflare Tunnel ingress configuration for cd node (citrusdental.in).
# tunnel ID and credentials-file are required when running in config-file mode.
# Get credentials JSON: Zero Trust → Networks → Tunnels → cd tunnel → Configure → Download credentials
tunnel: 600c2f7e-ff12-4d94-a203-320828aafdc9
credentials-file: /etc/cloudflared/credentials.json

ingress:
  - hostname: "*.citrusdental.in"
    service: https://traefik:443

  # Catch-all — required, must be last
  - service: http_status:404
